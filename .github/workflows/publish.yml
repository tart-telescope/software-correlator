name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        run: cargo test

      - uses: rust-lang/crates-io-auth-action@v1.0.4
        id: auth
      - run: cargo publish
        env:
            CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
